# L.I.R.A. Docker Compose
# Self-hosted deployment with local (Ollama) or cloud (Groq) LLM

services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:///./data/lira.db
      - LOG_LEVEL=INFO
      # --- LLM provider: "ollama" (default) or "groq" ---
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_MODEL=${LLM_MODEL:-gemma3:4b}
      # Ollama — used when LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
      # Groq — used when LLM_PROVIDER=groq (set GROQ_API_KEY in .env)
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    depends_on:
      ollama:
        condition: service_started
        required: false
    restart: unless-stopped
    command: uv run lira-api --host 0.0.0.0 --port 8001

  # Local LLM (Ollama) — GPU
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu

  # Local LLM (Ollama) — CPU only
  ollama-cpu:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - cpu

volumes:
  ollama_data:
