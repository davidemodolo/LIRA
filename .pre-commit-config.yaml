# See https://pre-commit.com for more information
# See https://pre-commit-hooks.readthedocs.io/en/stable/ for more info
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        additional_dependencies: [
            pydantic>=2.5.0,
            sqlalchemy>=2.0.0,
            pytest>=8.0.0,
            rich>=13.7.0,
            typer>=0.9.0,
        ]
        args: [
            --ignore-missing-imports,
            --warn-unreachable,
            --show-error-codes,
        ]

  - repo: https://github.com/bandit-network/bandit
    rev: v1.7.10
    hooks:
      - id: bandit
        args: [
            -r,
            --severity-level=medium,
            --confidence-level=medium,
        ]

  - repo: local
    hooks:
      - id: pytest
        name: pytest (unit tests)
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [push]
        files: ^tests/unit/
        args: ['tests/unit/', '-v', '--tb=short']

      - id: ruff-check
        name: ruff check (enforce)
        entry: uv run ruff check
        language: system
        pass_filenames: true
        types: [python]
        stages: [push]
        args: ['--output-format=github']
